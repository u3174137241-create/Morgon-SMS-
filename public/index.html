<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Morgon-SMS">
<title>Morgon-SMS · Auto</title>
<style>
  :root{--bg:#0a0e14;--ink:#f2efe6;--dim:#7d8694;--line:#1c2530;--card:#111823;--amber:#ffb347;--amber-deep:#e8892b;--green:#3ddc84;--red:#ff5c5c;--blue:#5b9dff}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif}
  body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px);min-height:100vh}
  .wrap{max-width:520px;margin:0 auto;padding:0 18px}
  header{padding:24px 0 12px}
  .kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red)}
  .dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
  h1{font-size:29px;font-weight:800;letter-spacing:-.02em}
  .sub{color:var(--dim);font-size:14px;margin-top:8px;line-height:1.5}
  .status{margin:6px 0 18px;padding:13px 16px;border:1px solid var(--line);border-radius:14px;font-size:13px;color:var(--dim);line-height:1.5;background:linear-gradient(135deg,#141c28,#0d131c)}
  .status b{color:var(--ink)}
  .status.bad{border-color:#3a2230;background:#170f14}.status.bad b{color:var(--red)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px}
  .card h2{font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);font-weight:700;margin-bottom:14px}
  label{display:block;font-size:13px;color:var(--dim);margin:0 0 6px;font-weight:600}
  input,textarea,select{width:100%;background:#0b111a;border:1px solid var(--line);border-radius:11px;color:var(--ink);padding:13px;font-size:16px;font-family:inherit;outline:none;transition:border-color .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--amber)}
  textarea{resize:vertical;min-height:80px;line-height:1.45}
  .field{margin-bottom:14px}.two{display:flex;gap:12px}.two .field{flex:1}
  .count{text-align:right;font-size:11px;color:var(--dim);margin-top:4px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .chip{background:#0b111a;border:1px solid var(--line);border-radius:20px;padding:8px 13px;font-size:13px;color:var(--dim);cursor:pointer;transition:all .15s}
  .chip:active{transform:scale(.95)}
  .chip.on{background:var(--amber);color:#1a1206;border-color:var(--amber);font-weight:700}
  .btn{border:none;border-radius:14px;font-size:15px;font-weight:700;padding:15px;width:100%;cursor:pointer;transition:transform .08s;font-family:inherit}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:linear-gradient(135deg,var(--amber),var(--amber-deep));color:#1a1206}
  .btn-ghost{background:#0b111a;color:var(--ink);border:1px solid var(--line)}
  .list-head{display:flex;align-items:baseline;justify-content:space-between;margin:22px 0 12px}
  .list-head h2{font-size:16px;font-weight:800}.list-head .n{color:var(--dim);font-size:13px}
  .empty{text-align:center;color:var(--dim);padding:32px 20px;font-size:14px;line-height:1.6;border:1px dashed var(--line);border-radius:16px}
  .empty .em{font-size:30px;display:block;margin-bottom:8px}
  .item{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:11px;position:relative;overflow:hidden}
  .item .top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .item .time{font-variant-numeric:tabular-nums;font-size:21px;font-weight:800}
  .item .when{font-size:12px;color:var(--amber);font-weight:600;background:#1c1509;padding:3px 9px;border-radius:8px}
  .item .who{font-size:12px;color:var(--dim);margin-left:auto;text-align:right;max-width:45%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .msg{font-size:14px;color:#c9d1dc;line-height:1.45;background:#0b111a;border-radius:10px;padding:10px 12px;margin-bottom:11px;white-space:pre-wrap;word-break:break-word}
  .item .acts{display:flex;gap:8px}
  .item .acts button{border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;color:var(--dim);border:1px solid var(--line)}
  .item .badge{position:absolute;top:0;right:0;font-size:9px;font-weight:800;letter-spacing:.05em;padding:3px 8px;border-radius:0 0 0 10px;text-transform:uppercase}
  .badge.rep{background:var(--blue);color:#04122e}.badge.done{background:var(--green);color:#04140a}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(120px);background:#1a2432;border:1px solid var(--line);color:var(--ink);padding:13px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 12px 40px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.2,.9,.3,1.3);z-index:100;max-width:90%;text-align:center}
  #toast.show{transform:translateX(-50%) translateY(0)}
  .lock{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;gap:14px}
  .lock.hidden{display:none}.lock h2{font-size:22px}.lock p{color:var(--dim);font-size:14px;text-align:center;max-width:320px}.lock input{max-width:280px;text-align:center}
  .foot{text-align:center;color:#4a5361;font-size:11px;line-height:1.6;margin-top:26px;padding:0 10px}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="lock" id="lock">
  <div style="font-size:40px">🔒</div>
  <h2>Morgon-SMS</h2>
  <p>Ange lösenordet för att fortsätta.</p>
  <input id="pw" type="password" placeholder="Lösenord" autocomplete="current-password">
  <button class="btn btn-primary" style="max-width:280px" id="unlock">Lås upp</button>
</div>

<div class="wrap">
  <header>
    <div class="kicker"><span class="dot" id="sdot"></span> Auto-läge · skickar av sig själv</div>
    <h1>☀️ Morgon-SMS</h1>
    <p class="sub">Servern skickar ditt SMS på exakt vald tid — även när telefonen är avslagen.</p>
  </header>
  <div class="status" id="status">Kontrollerar server…</div>
  <div class="card">
    <h2>Nytt automatiskt SMS</h2>
    <div class="field"><label>Till (+46701234567)</label>
      <input id="to" type="tel" inputmode="tel" placeholder="+46701234567" autocomplete="off"></div>
    <div class="field"><label>Meddelande</label>
      <textarea id="msg" maxlength="480" placeholder="Hej! Jag är sjuk idag och kommer inte in. / M"></textarea>
      <div class="count" id="count">0 tecken</div></div>
    <label>Snabbmallar</label>
    <div class="chips" id="templates"></div>
    <div class="two">
      <div class="field"><label>Tid</label><input id="time" type="time" value="06:00"></div>
      <div class="field"><label>Dag</label>
        <select id="day"><option value="today">Idag</option><option value="tomorrow" selected>Imorgon</option><option value="custom">Datum…</option></select></div>
    </div>
    <div class="field hidden" id="dateField"><label>Datum</label><input id="date" type="date"></div>
    <label>Upprepa</label>
    <div class="chips" id="repeat">
      <div class="chip on" data-rep="none">Aldrig</div>
      <div class="chip" data-rep="daily">Varje dag</div>
      <div class="chip" data-rep="weekdays">Vardagar</div>
      <div class="chip" data-rep="weekly">Varje vecka</div>
    </div>
    <div style="height:8px"></div>
    <button class="btn btn-primary" id="add">Schemalägg automatiskt utskick</button>
    <div style="height:8px"></div>
    <button class="btn btn-ghost" id="testBtn">Skicka testmeddelande nu</button>
  </div>
  <div class="list-head"><h2>Schemalagda</h2><span class="n" id="listCount"></span></div>
  <div id="list"></div>
  <div class="foot" id="foot"></div>
</div>
<div id="toast"></div>
